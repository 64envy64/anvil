<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" fill="none">
  <rect width="720" height="240" rx="10" fill="#09090B"/>
  <rect x="0.5" y="0.5" width="719" height="239" rx="9.5" stroke="#1E1E22"/>

  <!-- Window chrome -->
  <circle cx="20" cy="18" r="5" fill="#27272B"/>
  <circle cx="36" cy="18" r="5" fill="#27272B"/>
  <circle cx="52" cy="18" r="5" fill="#27272B"/>
  <text x="360" y="22" text-anchor="middle" font-family="monospace" font-size="11" fill="#5C5A56">Terminal</text>
  <line x1="0" y1="34" x2="720" y2="34" stroke="#1E1E22"/>

  <!-- Command -->
  <text font-family="monospace" font-size="13" fill="#9E9B97">
    <tspan x="20" y="60" fill="#5C5A56">$</tspan>
    <tspan dx="8" fill="#EDEAE6">anvil serve --stub tools.anvil.yaml</tspan>
  </text>

  <!-- Output -->
  <text font-family="monospace" font-size="12">
    <tspan x="20" y="95" fill="#7AA2F7">  anvil serve</tspan>
    <tspan dx="4" fill="#5C5A56">—</tspan>
    <tspan dx="4" fill="#EDEAE6">weather-tools v1.0.0</tspan>

    <tspan x="20" y="118" fill="#5C5A56">  2 tools: get_current_weather, get_forecast</tspan>
    <tspan x="20" y="138" fill="#5C5A56">  Mode: stub (returning example data)</tspan>
    <tspan x="20" y="158" fill="#5C5A56">  Transport: stdio</tspan>
    <tspan x="20" y="178" fill="#5C5A56">  Ready for MCP client connections.</tspan>
  </text>

  <!-- Accent badge -->
  <rect x="580" y="80" width="120" height="28" rx="6" fill="rgba(217,119,6,0.1)" stroke="#D97706" stroke-opacity="0.3"/>
  <text x="640" y="98" text-anchor="middle" font-family="monospace" font-size="10" fill="#D97706" font-weight="600">MCP Ready</text>

  <!-- Bottom hint -->
  <rect x="16" y="205" width="688" height="24" rx="5" fill="#131316"/>
  <text x="360" y="221" text-anchor="middle" font-family="monospace" font-size="10" fill="#5C5A56">Works with Claude Desktop · Cursor · Claude Code · any MCP client</text>
</svg>
